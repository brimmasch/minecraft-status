<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Dirt base -->
  <rect width="32" height="32" fill="#866043"/>
  <!-- Dirt texture -->
  <rect x="4" y="14" width="2" height="2" fill="#6b4c30"/>
  <rect x="10" y="18" width="2" height="2" fill="#6b4c30"/>
  <rect x="18" y="16" width="2" height="2" fill="#6b4c30"/>
  <rect x="24" y="20" width="2" height="2" fill="#6b4c30"/>
  <rect x="6" y="22" width="4" height="2" fill="#6b4c30"/>
  <rect x="16" y="24" width="2" height="2" fill="#6b4c30"/>
  <rect x="26" y="14" width="2" height="4" fill="#6b4c30"/>
  <!-- Grass top -->
  <rect x="0" y="0" width="32" height="12" fill="#5d9c2c"/>
  <!-- Grass texture highlights -->
  <rect x="2" y="2" width="2" height="2" fill="#6dbb34"/>
  <rect x="8" y="4" width="2" height="4" fill="#6dbb34"/>
  <rect x="14" y="2" width="2" height="2" fill="#6dbb34"/>
  <rect x="20" y="4" width="2" height="4" fill="#6dbb34"/>
  <rect x="26" y="2" width="4" height="2" fill="#6dbb34"/>
  <rect x="4" y="6" width="2" height="2" fill="#4d8c20"/>
  <rect x="12" y="8" width="4" height="2" fill="#4d8c20"/>
  <rect x="22" y="8" width="2" height="2" fill="#4d8c20"/>
  <!-- Grass-to-dirt transition band -->
  <rect x="0" y="10" width="32" height="4" fill="#6b9c3a"/>
  <rect x="0" y="12" width="32" height="2" fill="#866043"/>
</svg>
